apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: aiplex-system
data:
  aiplex_authz.rego: |
    package aiplex.authz
    import rego.v1

    default allow := false

    token := io.jwt.decode_verify(
        input.attributes.request.http.headers.authorization,
        {"iss": "https://aiplex.example.com/auth/realms/aiplex"}
    )
    claims := token[2]
    scopes := split(claims.scope, " ")
    body := json.unmarshal(input.attributes.request.http.body)
    path := input.attributes.request.http.path

    # MCPlex: tool calls
    allow if {
        body.method == "tools/call"
        sprintf("mcp:tools:%s", [body.params.name]) in scopes
    }

    # A2APlex: agent-to-agent delegation
    allow if {
        startswith(path, "/a2a/")
        sprintf("a2a:task:%s", [body.task_type]) in scopes
    }

    # LLMPlex: model inference
    allow if {
        startswith(path, "/llm/")
        model := input.attributes.request.http.headers["x-model-id"]
        sprintf("llm:model:%s", [model]) in scopes
    }

    # Discovery (all planes)
    allow if {
        body.method in {"initialize", "tools/list", "resources/list",
                        "tasks/list", "agents/list", "models/list", "ping"}
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa-ext-authz
  namespace: aiplex-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opa-ext-authz
  template:
    metadata:
      labels:
        app: opa-ext-authz
    spec:
      containers:
      - name: opa
        image: openpolicyagent/opa:latest-envoy
        args:
        - "run"
        - "--server"
        - "--addr=0.0.0.0:8181"
        - "--diagnostic-addr=0.0.0.0:8282"
        - "--set=plugins.envoy_ext_authz_grpc.addr=0.0.0.0:9191"
        - "--set=plugins.envoy_ext_authz_grpc.path=aiplex/authz/allow"
        - "--set=decision_logs.console=true"
        - "/policies/aiplex_authz.rego"
        ports:
        - containerPort: 9191
          name: grpc
        - containerPort: 8181
          name: http
        volumeMounts:
        - name: policy
          mountPath: /policies
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: policy
        configMap:
          name: opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: opa-ext-authz
  namespace: aiplex-system
spec:
  selector:
    app: opa-ext-authz
  ports:
  - name: grpc
    port: 9191
    targetPort: grpc
