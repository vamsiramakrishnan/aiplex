apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiplex-api
  namespace: aiplex-system
  annotations:
    iam.gke.io/gcp-service-account: aiplex-api@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiplex-api
  namespace: aiplex-system
  labels:
    app.kubernetes.io/name: aiplex-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiplex-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiplex-api
    spec:
      serviceAccountName: aiplex-api
      containers:
      - name: aiplex-api
        image: REGISTRY/aiplex-api:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: GCP_PROJECT
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: HYDRA_ADMIN_URL
          value: "http://hydra-admin:4445"
        - name: HYDRA_PUBLIC_URL
          value: "http://hydra-public:4444"
        - name: KRATOS_ADMIN_URL
          value: "http://kratos-admin:4434"
        - name: KRATOS_PUBLIC_URL
          value: "http://kratos-public:4433"
        - name: TRUST_DOMAIN
          value: "PROJECT_ID.svc.id.goog"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aiplex-api
  namespace: aiplex-system
spec:
  selector:
    app.kubernetes.io/name: aiplex-api
  ports:
  - name: http
    port: 8080
    targetPort: http
