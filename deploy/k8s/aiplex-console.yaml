apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiplex-console
  namespace: aiplex-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiplex-console
  namespace: aiplex-system
  labels:
    app.kubernetes.io/name: aiplex-console
    app.kubernetes.io/component: console
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aiplex-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiplex-console
    spec:
      serviceAccountName: aiplex-console
      containers:
      - name: nginx
        image: REGISTRY/aiplex-console:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 2
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aiplex-console
  namespace: aiplex-system
spec:
  selector:
    app.kubernetes.io/name: aiplex-console
  ports:
  - name: http
    port: 80
    targetPort: http
