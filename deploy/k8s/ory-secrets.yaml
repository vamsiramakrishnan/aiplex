# Ory secrets — populated by Terraform outputs or `aiplex platform apply`.
# Values are generated by Terraform (random_password) and stored in Secret Manager.
# This manifest is a template — actual values are injected during deployment.
#
# To apply manually:
#   kubectl create secret generic hydra-secrets \
#     --from-literal=system-secret=$(gcloud secrets versions access latest --secret=hydra-system-secret) \
#     --from-literal=pairwise-salt=$(gcloud secrets versions access latest --secret=hydra-pairwise-salt) \
#     --from-literal=db-password=$(gcloud secrets versions access latest --secret=alloydb-password) \
#     -n aiplex-system
#
apiVersion: v1
kind: Secret
metadata:
  name: hydra-secrets
  namespace: aiplex-system
  labels:
    app.kubernetes.io/name: hydra
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  # These placeholders are replaced by Helm --set or external-secrets-operator
  system-secret: "PLACEHOLDER_HYDRA_SYSTEM_SECRET"
  pairwise-salt: "PLACEHOLDER_HYDRA_PAIRWISE_SALT"
  db-password: "PLACEHOLDER_ALLOYDB_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: kratos-secrets
  namespace: aiplex-system
  labels:
    app.kubernetes.io/name: kratos
    app.kubernetes.io/component: identity
type: Opaque
stringData:
  cookie-secret: "PLACEHOLDER_KRATOS_COOKIE_SECRET"
  cipher-secret: "PLACEHOLDER_KRATOS_CIPHER_SECRET"
  db-password: "PLACEHOLDER_ALLOYDB_PASSWORD"
