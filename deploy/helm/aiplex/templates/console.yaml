apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiplex-console
  namespace: {{ include "aiplex.namespace" . }}
  labels:
    {{- include "aiplex.labels" . | nindent 4 }}
    app.kubernetes.io/name: aiplex-console
    app.kubernetes.io/component: console
spec:
  replicas: {{ .Values.console.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aiplex-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiplex-console
    spec:
      containers:
      - name: nginx
        image: {{ include "aiplex.console.image" . }}
        ports:
        - containerPort: 80
          name: http
        resources:
          {{- toYaml .Values.console.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: aiplex-console
  namespace: {{ include "aiplex.namespace" . }}
  labels:
    {{- include "aiplex.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: aiplex-console
  ports:
  - name: http
    port: 80
    targetPort: http
