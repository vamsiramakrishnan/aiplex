apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiplex-api
  namespace: {{ include "aiplex.namespace" . }}
  annotations:
    iam.gke.io/gcp-service-account: aiplex-api@{{ .Values.global.projectId }}.iam.gserviceaccount.com
  labels:
    {{- include "aiplex.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiplex-api
  namespace: {{ include "aiplex.namespace" . }}
  labels:
    {{- include "aiplex.labels" . | nindent 4 }}
    app.kubernetes.io/name: aiplex-api
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aiplex-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aiplex-api
    spec:
      serviceAccountName: aiplex-api
      containers:
      - name: aiplex-api
        image: {{ include "aiplex.api.image" . }}
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: GCP_PROJECT
          value: {{ .Values.global.projectId | quote }}
        - name: HYDRA_ADMIN_URL
          value: "http://{{ .Release.Name }}-hydra-admin:4445"
        - name: HYDRA_PUBLIC_URL
          value: "http://{{ .Release.Name }}-hydra-public:4444"
        - name: KRATOS_ADMIN_URL
          value: "http://{{ .Release.Name }}-kratos-admin:4434"
        - name: KRATOS_PUBLIC_URL
          value: "http://{{ .Release.Name }}-kratos-public:4433"
        - name: TRUST_DOMAIN
          value: {{ .Values.global.trustDomain | quote }}
        - name: LOG_LEVEL
          value: "info"
        - name: GATEWAY_NAME
          value: "aiplex-gateway"
        {{- range $key, $value := .Values.api.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: aiplex-api
  namespace: {{ include "aiplex.namespace" . }}
  labels:
    {{- include "aiplex.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: aiplex-api
  ports:
  - name: http
    port: 8080
    targetPort: http
