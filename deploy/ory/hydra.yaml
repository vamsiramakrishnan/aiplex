# Ory Hydra server configuration for AIPlex
# See: https://www.ory.sh/docs/hydra/reference/configuration
serve:
  public:
    cors:
      enabled: true
      allowed_origins:
        - https://console.aiplex.example.com
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type

  admin:
    host: 0.0.0.0
    port: 4445

urls:
  self:
    issuer: https://aiplex.example.com/auth/realms/aiplex
  consent: https://aiplex.example.com/auth/consent
  login: https://aiplex.example.com/auth/login
  logout: https://aiplex.example.com/auth/logout

# DSN is injected via Helm values or K8s Secret reference.
# In production, the password comes from Secret Manager via external-secrets or Helm.
dsn: postgres://hydra:$(ALLOYDB_PASSWORD)@alloydb-proxy:5432/hydra?sslmode=disable

secrets:
  system:
    # Injected from K8s Secret 'hydra-secrets' key 'system-secret'.
    # Generated by Terraform (random_password) and stored in Secret Manager.
    # Referenced via Helm: --set hydra.config.secrets.system[0]=$(SECRET)
    - $(HYDRA_SYSTEM_SECRET)

oidc:
  subject_identifiers:
    supported_types:
      - public
      - pairwise
    pairwise:
      # Injected from K8s Secret 'hydra-secrets' key 'pairwise-salt'.
      salt: $(HYDRA_PAIRWISE_SALT)

oauth2:
  expose_internal_errors: false
  # Token hook injects the act claim (RFC 8693)
  token_hook:
    url: http://aiplex-api.aiplex-system.svc.cluster.local:8080/auth/token-hook

strategies:
  access_token: jwt
  scope: exact

ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m
  login_consent_request: 30m

webfinger:
  jwks:
    broadcast_keys:
      - hydra.jwt.access-token

log:
  level: info
  format: json
