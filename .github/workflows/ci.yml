name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -v -count=1 -race

      - name: Build API
        run: go build -trimpath -o bin/aiplex-api ./cmd/aiplex-api

      - name: Build CLI
        run: go build -trimpath -o bin/aiplex ./cmd/aiplex-cli

  console:
    name: Console Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json

      - run: npm ci
      - run: npm run build

  helm:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - run: helm lint deploy/helm/aiplex
      - run: helm lint deploy/helm/aiplex --values deploy/helm/aiplex/values-dev.yaml
      - run: helm lint deploy/helm/aiplex --values deploy/helm/aiplex/values-prod.yaml
